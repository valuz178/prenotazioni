<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Prenotazioni" />
  <meta name="theme-color" content="#8B6F47" />
  <title>Registro Prenotazioni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7F4EE; --card: #FDFAF5; --white: #ffffff;
      --border: #D5C8B5; --border-light: #EDE9E0;
      --brown: #8B6F47; --brown-dark: #6D5536; --brown-pale: #F0EBE1;
      --text: #1a1a1a; --muted: #888; --green: #2E7D32;
    }
    body { background: var(--bg); font-family: 'Source Serif 4', Georgia, serif; color: var(--text); min-height: 100vh; padding: 24px 16px 80px; }
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(22px, 5vw, 30px); font-weight: 700; letter-spacing: -0.5px; }
    .header { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 22px; max-width: 1100px; margin-inline: auto; }
    .subtitle { font-size: 13px; color: var(--muted); font-style: italic; margin-top: 3px; }
    .btn-primary { background: var(--brown); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; transition: background 0.2s; white-space: nowrap; }
    .btn-primary:hover, .btn-primary:active { background: var(--brown-dark); }
    .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--brown-dark); padding: 9px 18px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; }
    .btn-ghost:hover { background: var(--border-light); }
    .stats { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; max-width: 1100px; margin-inline: auto; }
    .stat-card { background: var(--white); border: 1px solid var(--border-light); border-radius: 10px; padding: 14px 18px; min-width: 120px; }
    .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--brown); margin-bottom: 4px; }
    .stat-value { font-family: 'Playfair Display', serif; font-size: 21px; font-weight: 700; }
    .yearly-wrap { max-width: 1100px; margin-inline: auto; margin-bottom: 24px; }
    .yearly-title { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--brown); margin-bottom: 10px; }
    .yearly-grid { display: flex; gap: 10px; flex-wrap: wrap; }
    .year-card { background: var(--white); border: 1px solid var(--border-light); border-radius: 10px; padding: 14px 18px; min-width: 160px; position: relative; overflow: hidden; }
    .year-card::before { content: attr(data-year); position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; color: var(--border-light); line-height: 1; pointer-events: none; }
    .year-label { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
    .year-sub { font-size: 12px; color: var(--muted); line-height: 1.7; }
    .table-wrap { max-width: 1100px; margin-inline: auto; overflow-x: auto; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); border: 1px solid var(--border-light); }
    table { width: 100%; border-collapse: collapse; background: var(--white); min-width: 680px; }
    thead tr { background: var(--brown-pale); border-bottom: 2px solid var(--border); }
    th { padding: 11px 13px; text-align: left; font-size: 10px; font-weight: 600; letter-spacing: 0.7px; text-transform: uppercase; color: #666; white-space: nowrap; cursor: pointer; user-select: none; }
    th:hover { color: var(--brown); }
    th.active { color: var(--brown); }
    th.no-sort { cursor: default; }
    tbody tr { border-bottom: 1px solid var(--border-light); transition: background 0.12s; }
    tbody tr:nth-child(even) { background: #FDFAF5; }
    tbody tr:hover { background: var(--border-light); }
    td { padding: 11px 13px; font-size: 14px; white-space: nowrap; }
    .td-price { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--green); }
    .td-muted { color: var(--muted); }
    .td-note { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); font-style: italic; font-size: 13px; }
    .pill { display: inline-block; padding: 2px 10px; border-radius: 20px; color: white; font-size: 11px; white-space: nowrap; }
    .icon-btn { background: none; border: none; cursor: pointer; padding: 4px 5px; border-radius: 4px; font-size: 15px; transition: background 0.15s; }
    .icon-btn:hover { background: #ddd5c8; }
    .empty { text-align: center; padding: 64px 20px; background: var(--white); border-radius: 12px; border: 1.5px dashed var(--border); font-style: italic; color: #aaa; max-width: 1100px; margin-inline: auto; }
    .empty span { display: block; font-size: 13px; margin-top: 6px; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(30,20,10,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .overlay.open { display: flex; }
    .modal { background: var(--card); border-radius: 14px; padding: 28px 24px; width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); max-height: 92vh; overflow-y: auto; }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; margin-bottom: 22px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 16px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field-label { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--brown); }
    .field input, .field select, .field textarea { padding: 9px 11px; border: 1.5px solid var(--border); border-radius: 7px; font-family: inherit; font-size: 14px; background: white; color: var(--text); outline: none; transition: border-color 0.2s; width: 100%; }
    .field textarea { resize: vertical; min-height: 72px; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--brown); box-shadow: 0 0 0 2px rgba(139,111,71,0.15); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
    .full-span { grid-column: 1 / -1; }
    .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(30,20,10,0.5); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
    .confirm-overlay.open { display: flex; }
    .confirm-box { background: var(--card); border-radius: 12px; padding: 28px 24px; max-width: 300px; width: 100%; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
    .confirm-box p { font-size: 15px; margin-bottom: 20px; line-height: 1.5; }
    .btn-danger { background: #c62828; color: white; border: none; padding: 10px 20px; border-radius: 7px; cursor: pointer; font-family: inherit; font-size: 14px; }
    .btn-danger:hover { background: #a31515; }
    @media (max-width: 480px) { .grid2 { grid-template-columns: 1fr; } body { padding: 16px 12px 80px; } }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>Registro Prenotazioni</h1>
    <div class="subtitle" id="subtitle">Nessuna prenotazione</div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="btn-ghost" onclick="exportCSV()">⬇ Esporta CSV</button>
    <button class="btn-primary" onclick="openForm()">+ Nuova</button>
  </div>
</div>

<div id="stats" style="display:none">
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Incasso totale</div>
      <div class="stat-value" id="stat-revenue" style="color:var(--green)">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Notti totali</div>
      <div class="stat-value" id="stat-nights">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Media / notte</div>
      <div class="stat-value" id="stat-avg">—</div>
    </div>
  </div>
  <div class="yearly-wrap">
    <div class="yearly-title">Anno per anno</div>
    <div class="yearly-grid" id="yearly-grid"></div>
  </div>
</div>

<div id="empty-state" class="empty">
  Nessuna prenotazione ancora.<span>Tocca "+ Nuova" per iniziare.</span>
</div>

<div class="table-wrap" id="table-wrap" style="display:none">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('checkIn')" id="th-checkIn">Check-in</th>
        <th onclick="sortBy('checkOut')" id="th-checkOut">Check-out</th>
        <th class="no-sort">Notti</th>
        <th onclick="sortBy('prezzo')" id="th-prezzo">Prezzo €</th>
        <th onclick="sortBy('piattaforma')" id="th-piattaforma">Piattaforma</th>
        <th onclick="sortBy('ospiti')" id="th-ospiti">Ospiti</th>
        <th onclick="sortBy('paese')" id="th-paese">Paese</th>
        <th class="no-sort">Note</th>
        <th class="no-sort"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Nuova prenotazione</h2>
    <div class="grid2">
      <div class="field">
        <label class="field-label">Check-in</label>
        <input type="date" id="f-checkIn" />
      </div>
      <div class="field">
        <label class="field-label">Check-out</label>
        <input type="date" id="f-checkOut" />
      </div>
      <div class="field">
        <label class="field-label">Prezzo pagato (€)</label>
        <input type="number" id="f-prezzo" min="0" placeholder="es. 1200" />
      </div>
      <div class="field">
        <label class="field-label">N° ospiti</label>
        <input type="number" id="f-ospiti" min="1" placeholder="es. 2" />
      </div>
      <div class="field">
        <label class="field-label">Piattaforma</label>
        <select id="f-piattaforma">
          <option value="">— Seleziona —</option>
          <option>Airbnb</option>
          <option>Oazo Homes</option>
          <option>Nice2Stay</option>
          <option>Plum Guide</option>
          <option>Oliver's Travels</option>
          <option>Urlaubsarchitektur</option>
          <option>Sito diretto</option>
          <option>Altro</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">Paese di provenienza</label>
        <input type="text" id="f-paese" placeholder="es. Germania" />
      </div>
      <div class="field full-span">
        <label class="field-label">Note</label>
        <textarea id="f-note" placeholder="Ospiti, richieste speciali, note interne…"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeForm()">Annulla</button>
      <button class="btn-primary" onclick="saveBooking()">Salva</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p>Eliminare questa prenotazione?</p>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn-ghost" onclick="closeConfirm()">Annulla</button>
      <button class="btn-danger" onclick="confirmDelete()">Elimina</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = "cdf_prenotazioni_v1";
  const PLATFORM_COLORS = {
    "Airbnb": "#FF5A5F", "Oazo Homes": "#E87722", "Nice2Stay": "#5B8DB8",
    "Plum Guide": "#1A1A2E", "Oliver's Travels": "#4A7C59",
    "Urlaubsarchitektur": "#C0392B", "Sito diretto": "#8B6F47", "Altro": "#78909C",
  };

  let bookings = [], editId = null, deleteId = null, sortKey = "checkIn", sortDir = "asc";

  function load() {
    try { bookings = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { bookings = []; }
    render();
  }
  function persist() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(bookings)); } catch {} }
  function nights(a, b) { if (!a || !b) return null; const n = Math.round((new Date(b) - new Date(a)) / 86400000); return n > 0 ? n : null; }
  function fmtDate(d) { if (!d) return ""; const [y,m,day] = d.split("-"); return `${day}/${m}/${y}`; }
  function fmtEur(v) { const n = parseFloat(v); if (isNaN(n)) return "—"; return "€" + n.toLocaleString("it-IT", {minimumFractionDigits:0}); }
  function yearOf(b) { return b.checkIn ? b.checkIn.split("-")[0] : null; }

  function sortBy(key) {
    if (sortKey === key) sortDir = sortDir === "asc" ? "desc" : "asc";
    else { sortKey = key; sortDir = "asc"; }
    render();
  }
  function getSorted() {
    return [...bookings].sort((a, b) => {
      let va = a[sortKey] ?? "", vb = b[sortKey] ?? "";
      if (sortKey === "prezzo" || sortKey === "ospiti") { va = parseFloat(va)||0; vb = parseFloat(vb)||0; }
      if (va < vb) return sortDir === "asc" ? -1 : 1;
      if (va > vb) return sortDir === "asc" ? 1 : -1;
      return 0;
    });
  }

  function render() {
    const n = bookings.length;
    document.getElementById("subtitle").textContent =
      n === 0 ? "Nessuna prenotazione" : `${n} prenotazion${n===1?"e":"i"} registrat${n===1?"a":"e"}`;
    document.getElementById("empty-state").style.display = n === 0 ? "block" : "none";
    document.getElementById("table-wrap").style.display = n === 0 ? "none" : "block";
    document.getElementById("stats").style.display = n === 0 ? "none" : "block";

    if (n > 0) {
      const totalRev = bookings.reduce((s,b) => s + (parseFloat(b.prezzo)||0), 0);
      const totalN   = bookings.reduce((s,b) => s + (nights(b.checkIn, b.checkOut)||0), 0);
      document.getElementById("stat-revenue").textContent = fmtEur(totalRev);
      document.getElementById("stat-nights").textContent  = totalN || "—";
      document.getElementById("stat-avg").textContent     = totalN > 0 ? fmtEur(totalRev/totalN) : "—";
      const byYear = {};
      bookings.forEach(b => {
        const y = yearOf(b); if (!y) return;
        if (!byYear[y]) byYear[y] = { rev: 0, nights: 0, count: 0 };
        byYear[y].rev += parseFloat(b.prezzo)||0;
        byYear[y].nights += nights(b.checkIn, b.checkOut)||0;
        byYear[y].count += 1;
      });
      const yg = document.getElementById("yearly-grid");
      yg.innerHTML = "";
      Object.keys(byYear).sort((a,b) => b-a).forEach(y => {
        const d = byYear[y];
        const avg = d.nights > 0 ? fmtEur(d.rev/d.nights) : "—";
        const card = document.createElement("div");
        card.className = "year-card"; card.setAttribute("data-year", y);
        card.innerHTML = `<div class="year-label">${fmtEur(d.rev)}</div><div class="year-sub">${d.count} prenotazion${d.count===1?"e":"i"}<br>${d.nights} notti · ${avg}/notte</div>`;
        yg.appendChild(card);
      });
    }

    document.querySelectorAll("th[id]").forEach(th => {
      const k = th.id.replace("th-","");
      th.classList.toggle("active", k===sortKey);
      const base = th.textContent.replace(/ [▲▼⇅]$/,"");
      th.textContent = base + (k===sortKey ? (sortDir==="asc"?" ▲":" ▼") : " ⇅");
    });

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";
    getSorted().forEach(b => {
      const n = nights(b.checkIn, b.checkOut);
      const color = PLATFORM_COLORS[b.piattaforma]||"#78909C";
      const noteEsc = (b.note||"").replace(/"/g,"&quot;");
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${fmtDate(b.checkIn)}</td><td>${fmtDate(b.checkOut)}</td><td class="td-muted">${n!==null?n:"—"}</td><td class="td-price">${fmtEur(b.prezzo)}</td><td>${b.piattaforma?`<span class="pill" style="background:${color}">${b.piattaforma}</span>`:"—"}</td><td>${b.ospiti||"—"}</td><td>${b.paese||"—"}</td><td class="td-note" title="${noteEsc}">${b.note||""}</td><td><button class="icon-btn" onclick="openEdit('${b.id}')">✏️</button><button class="icon-btn" onclick="askDelete('${b.id}')">🗑️</button></td>`;
      tbody.appendChild(tr);
    });
  }

  function openForm() {
    editId = null;
    document.getElementById("modal-title").textContent = "Nuova prenotazione";
    ["checkIn","checkOut","prezzo","ospiti","piattaforma","paese","note"].forEach(k => document.getElementById("f-"+k).value="");
    document.getElementById("overlay").classList.add("open");
  }
  function openEdit(id) {
    const b = bookings.find(x => x.id===id); if (!b) return;
    editId = id;
    document.getElementById("modal-title").textContent = "Modifica prenotazione";
    ["checkIn","checkOut","prezzo","ospiti","piattaforma","paese","note"].forEach(k => document.getElementById("f-"+k).value=b[k]||"");
    document.getElementById("overlay").classList.add("open");
  }
  function closeForm() { document.getElementById("overlay").classList.remove("open"); }
  function saveBooking() {
    const get = id => document.getElementById("f-"+id).value.trim();
    const checkIn = get("checkIn"), checkOut = get("checkOut");
    if (!checkIn||!checkOut) { alert("Inserisci almeno check-in e check-out."); return; }
    const entry = { id: editId||Date.now().toString(), checkIn, checkOut, prezzo: get("prezzo"), ospiti: get("ospiti"), piattaforma: get("piattaforma"), paese: get("paese"), note: get("note") };
    if (editId) { bookings = bookings.map(b => b.id===editId?entry:b); } else { bookings.push(entry); }
    persist(); closeForm(); render();
  }
  function askDelete(id) { deleteId=id; document.getElementById("confirm-overlay").classList.add("open"); }
  function closeConfirm() { deleteId=null; document.getElementById("confirm-overlay").classList.remove("open"); }
  function confirmDelete() { bookings=bookings.filter(b=>b.id!==deleteId); persist(); closeConfirm(); render(); }
  document.getElementById("overlay").addEventListener("click",e=>{if(e.target===e.currentTarget)closeForm();});
  document.getElementById("confirm-overlay").addEventListener("click",e=>{if(e.target===e.currentTarget)closeConfirm();});

  function exportCSV() {
    if (!bookings.length) { alert("Nessuna prenotazione da esportare."); return; }
    const header = ["Check-in","Check-out","Notti","Prezzo (EUR)","Piattaforma","Ospiti","Paese","Note"];
    const rows = bookings.map(b => { const n=nights(b.checkIn,b.checkOut); return [b.checkIn,b.checkOut,n!==null?n:"",b.prezzo||"",b.piattaforma||"",b.ospiti||"",b.paese||"",b.note||""]; });
    const csv = [header,...rows].map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(",")).join("\n");
    const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download="prenotazioni_cdf.csv"; a.click();
    URL.revokeObjectURL(url);
  }

  load();
</script>
</body>
</html>
